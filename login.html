<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - InsurancePro</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    /* DARKER LIGHT BLUE BACKGROUND */
    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg,#9BBCE6,#6F9DE3);
    }

    /* GLASS LOGIN BOX */
    .login-box{
        width:350px;
        padding:40px;
        border-radius:15px;

        /* GLASS EFFECT */
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);

        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        text-align:center;
        color:white;
    }

    h2{
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:10px;
        margin:10px 0;
        border:none;
        border-radius:6px;
        outline:none;
    }

    /* BUTTON */
    button{
        width:100%;
        padding:12px;
        margin-top:10px;
        border:none;
        border-radius:6px;
        background:#2F5DAA;
        color:white;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#1e3f7a;
    }

    /* SMALL TEXT */
    .extra{
        margin-top:15px;
        font-size:14px;
    }

    .extra a{
        color:white;
        text-decoration:underline;
        cursor:pointer;
    }

</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button onclick="goDashboard()">Login</button>

    <div class="extra">
        Don't have an account? <a>Register</a>
    </div>
</div>

<script>
    function goDashboard(){
        window.location.href="dashboard.html";
    }
</script>

</body>
</html>
