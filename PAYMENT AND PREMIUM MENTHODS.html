
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Premium & Payments</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9fafb;
      margin: 0;
      padding: 20px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #2c3e50;
    }

    .section {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      margin-bottom: 25px;
    }

    .due-info {
      font-size: 1.2rem;
      margin-bottom: 15px;
    }

    .due-info span {
      font-weight: bold;
      color: #27ae60;
    }

    .payment-options button {
      background-color: #3498db;
      border: none;
      color: white;
      padding: 10px 18px;
      margin-right: 10px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .payment-options button:hover {
      background-color: #2980b9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table th, table td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid #ddd;
    }

    table th {
      background-color: #f2f6fc;
      font-weight: 600;
      color: #34495e;
    }

    .status-paid {
      color: #27ae60;
      font-weight: bold;
    }

    .status-pending {
      color: #f39c12;
      font-weight: bold;
    }

    .status-failed {
      color: #e74c3c;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Premium & Payments</h1>

  <div class="section due-section">
    <div class="due-info">
      Upcoming Premium Due: <span>$350.00</span><br />
      Due Date: <span>2026-04-25</span>
    </div>
    <div class="payment-options">
      <button onclick="alert('Pay by Credit Card')">Pay by Credit Card</button>
      <button onclick="alert('Pay by Net Banking')">Pay by Net Banking</button>
      <button onclick="alert('Pay by UPI')">Pay by UPI</button>
    </div>
  </div>

  <div class="section history-section">
    <h2>Payment History</h2>
    <table>
      <thead>
        <tr>
          <th>Payment Date</th>
          <th>Amount</th>
          <th>Method</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="paymentHistoryBody">
        <!-- Rows generated by JS -->
      </tbody>
    </table>
  </div>

  <script>
    const paymentHistory = [
      {
        date: "2025-10-25",
        amount: 350,
        method: "Credit Card",
        status: "Paid"
      },
      {
        date: "2025-04-20",
        amount: 350,
        method: "Net Banking",
        status: "Paid"
      },
      {
        date: "2024-10-22",
        amount: 350,
        method: "UPI",
        status: "Failed"
      },
      {
        date: "2024-04-19",
        amount: 350,
        method: "Credit Card",
        status: "Pending"
      }
    ];

    function getStatusClass(status) {
      if (status === "Paid") return "status-paid";
      if (status === "Pending") return "status-pending";
      if (status === "Failed") return "status-failed";
      return "";
    }

    function renderPaymentHistory() {
      const tbody = document.getElementById("paymentHistoryBody");
      paymentHistory.forEach(payment => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${payment.date}</td>
          <td>$${payment.amount.toFixed(2)}</td>
          <td>${payment.method}</td>
          <td class="${getStatusClass(payment.status)}">${payment.status}</td>
        `;

        tbody.appendChild(tr);
      });
    }

    renderPaymentHistory();
  </script>
  
</body>
</html>
