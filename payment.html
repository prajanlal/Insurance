<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment & Premium</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .btn-pay {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-pay:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Make Payment</h1>
    <form id="paymentForm">
        <label for="policy">Select Policy:</label>
        <select id="policy" required>
            <option value="">-- Select Policy --</option>
            <option value="P001">Health Insurance</option>
            <option value="P002">Life Insurance</option>
            <option value="P003">Car Insurance</option>
            <!-- Add more policies here -->
        </select>

        <label for="cardName">Cardholder Name:</label>
        <input type="text" id="cardName" placeholder="Name on card" required>

        <label for="cardNumber">Card Number:</label>
        <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" required pattern="\d{16}" maxlength="16">

        <label for="expiry">Expiry Date:</label>
        <input type="month" id="expiry" required>

        <label for="cvv">CVV:</label>
        <input type="password" id="cvv" placeholder="123" required pattern="\d{3}" maxlength="3">

        <label for="amount">Amount:</label>
        <input type="number" id="amount" placeholder="Enter amount" required min="1">

        <button type="submit" class="btn-pay">Pay Now</button>
    </form>
</div>

<script>
    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const policy = document.getElementById('policy').value;
        const amount = document.getElementById('amount').value;

        if (!policy) {
            alert('Please select a policy.');
            return;
        }

        alert(`Payment of $${amount} for policy ${policy} is successful!`);
        // Here you can connect to a backend or payment gateway
        this.reset();
    });
</script>

</body>
</html>
