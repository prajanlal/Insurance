  .quick-actions {
    display: flex;

    gap: 20px;
  }

  button {
    background-color: #2980b9;
    border: none;
    color: white;
    padding: 15px 25px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.3s ease;
  }

  button:hover {
    background-color: #1c5980;
  }
</style>
</head>

</html>
