<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Policy</title>
<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body {
    background:#BFD4F2;
}

/* NAVBAR */
.navbar {
    background:#2F5DAA;
    color:white;
    padding:20px 40px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
}

/* CONTAINER */
.container {
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1 {
    text-align:center;
    color:#2F5DAA;
    margin-bottom:25px;
}

/* TABLE STYLING */
table {
    width:100%;
    border-collapse: collapse;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th, td {
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

th {
    background-color:#2F5DAA;
    color:white;
}

tr:hover {
    background-color:#f1f1f1;
}

.btn-view {
    padding:6px 12px;
    background-color:#2F5DAA;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
}

.btn-view:hover {
    background-color:#1B3F7E;
}
</style>
</head>
<body>

<div class="navbar">View Policies</div>

<div class="container">
<h1>Your Policies</h1>

<table>
    <thead>
        <tr>
            <th>Policy ID</th>
            <th>Policy Name</th>
            <th>Premium</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>P001</td>
            <td>Health Insurance</td>
            <td>₹500/year</td>
            <td>2026-01-01</td>
            <td>2026-12-31</td>
            <td><button class="btn-view" onclick="viewPolicy('P001')">View</button></td>
        </tr>
        <tr>
            <td>P002</td>
            <td>Life Insurance</td>
            <td>₹1000/year</td>
            <td>2026-02-01</td>
            <td>2027-01-31</td>
            <td><button class="btn-view" onclick="viewPolicy('P002')">View</button></td>
        </tr>
        <!-- Add more rows as needed -->
    </tbody>
</table>
</div>

<script>
function viewPolicy(policyId) {
    alert("Viewing details for Policy ID: " + policyId);
    // Redirect to policy details page if needed
    // window.location.href = "policy-details.html?policyId=" + policyId;
}
</script>

</body>
</html>
